name: Plugin version guard

on:
  pull_request:
    branches: [main]

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate marketplace and plugin manifests
        run: claude plugin validate --strict .

      - name: Check plugin/marketplace version was bumped
        run: python3 .github/scripts/check_version_bump.py "origin/${{ github.base_ref }}"
