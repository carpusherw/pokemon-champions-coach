notes: >
  Guts (commonly paired with a self-inflicted Flame Orb burn) raises its
  Attack by 1.5x and negates the burn's usual physical-damage halving --
  it takes the extra HP chip each turn but deals full damage; Mach Punch
  gives it priority alongside Drain Punch's recovery.
