  than a pure recall/search-synthesis pass, but still not primary-source-
  verified against an official Pokemon Champions patch note, including
  which specific Raichu form (Kantonian vs Alolan) the games actually grant
  the Mega Stones to.

  `moves` is a curated list of moves this species commonly runs in mainline
