  (Electric/Psychic, Surge Surfer) -- see raichu-alola.yaml for that form,
  which was independently confirmed to be a separately legal species this
  session but was not confirmed to receive its own Mega Stone (only base
  Raichu was seen paired with the Mega X/Y items in this session's
  research).
data_confidence: >
