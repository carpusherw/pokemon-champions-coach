  note: >
    Confirmed via PokeAPI (pokemon/raichu-mega-x id 10304, raichu-mega-y id
    10305) on 2026-07-18: Raichu uniquely gets two Mega Stones this
    regulation (mirrors Charizard/Mewtwo X/Y elsewhere in the franchise),
    and unlike those, both forms stay pure Electric type (no secondary
    type). X is a fast physical attacker that also sets Electric Terrain on
    switch-in (Electric Surge); Y is a bulkier-HP-but-frailer, very fast
    special attacker whose ability (No Guard) makes all of its own and its
    target's moves bypass accuracy/evasion checks -- useful for otherwise
    unreliable moves like Thunder or Zap Cannon.
